<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golf Pool</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Georgia, 'Times New Roman', serif; background: #f9f9f6; color: #333; }
:root {
  --green: #006747; --dk-green: #004D2F; --gold: #FFD700; --red: #CC0000;
  --lt-red: #FFEBEE; --lt-green: #E8F5E9; --white: #fff; --gray: #F5F5F5;
  --med: #999; --border: #E0E0E0; --dk: #333;
}
.page { max-width: 960px; margin: 0 auto; padding: 0 16px 40px; }
.card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px; margin-bottom: 16px; }
h2.hd { color: var(--green); font-size: 20px; font-weight: 700; margin: 0 0 4px; }
h3.hd { color: var(--green); font-size: 16px; font-weight: 700; margin: 0 0 4px; }
.sub { font-size: 13px; color: var(--med); }
.lbl { font-size: 12px; color: var(--med); display: block; margin-bottom: 2px; }
input, select, textarea { padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border); font-size: 14px; font-family: inherit; width: 100%; }
input:focus, select:focus { outline: none; border-color: var(--green); }
.btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; font-family: inherit; }
.btn-p { background: var(--green); color: var(--white); }
.btn-g { background: var(--gold); color: var(--dk-green); }
.btn-d { background: var(--red); color: var(--white); }
.btn-o { background: transparent; border: 1.5px solid var(--green); color: var(--green); }
.btn:hover { opacity: 0.9; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: var(--green); color: var(--white); padding: 8px 6px; text-align: center; font-size: 11px; font-weight: 600; }
th.left { text-align: left; }
td { padding: 6px; border-bottom: 1px solid var(--border); text-align: center; }
td.left { text-align: left; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.bg-lr { background: var(--lt-red); color: var(--red); }
.bg-lg { background: var(--lt-green); color: var(--green); }
.bg-warn { background: #FFF3E0; color: #E65100; }
.metric { padding: 12px; background: var(--gray); border-radius: 8px; text-align: center; }
.metric .val { font-size: 22px; font-weight: 700; color: var(--dk); }
.metric .lbl2 { font-size: 11px; color: var(--med); }
.topbar { background: var(--green); padding: 12px 0; margin-bottom: 24px; }
.topbar-inner { max-width: 960px; margin: 0 auto; padding: 0 50px 0 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.topbar h1 { color: var(--gold); font-size: 22px; font-weight: 700; }
.topbar .st { color: rgba(255,255,255,0.7); font-size: 12px; }
.nav { display: flex; gap: 6px; flex-wrap: wrap; }
.pill { padding: 6px 14px; border-radius: 20px; border: 1.5px solid rgba(255,255,255,0.3); background: transparent; color: rgba(255,255,255,0.8); cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit; }
.pill.on { border-color: var(--gold); background: var(--gold); color: var(--dk-green); }
.score-input { width: 52px; padding: 4px 6px; text-align: center; font-size: 13px; }
.cut-sel { padding: 4px 6px; font-size: 12px; width: auto; }
.link-btn { border: none; background: none; cursor: pointer; font-size: 12px; font-family: inherit; }
.pub-box { padding: 16px; border-radius: 8px; border: 2px solid var(--border); cursor: pointer; text-align: center; }
.pub-box.on { border-color: var(--green); background: var(--lt-green); }
.pct-bar { width: 60px; background: var(--gray); display: inline-block; height: 6px; border-radius: 3px; vertical-align: middle; }
.pct-fill { height: 6px; border-radius: 3px; background: var(--green); display: block; }
.landing { max-width: 480px; margin: 60px auto; text-align: center; }
.landing h1 { color: var(--gold); font-size: 36px; }
.role-card { cursor: pointer; text-align: center; border-width: 2px; }
.role-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.pin-box { max-width: 360px; margin: 80px auto; text-align: center; }
.pin-input { text-align: center; font-size: 20px; letter-spacing: 8px; }
.err { color: var(--red); font-size: 13px; margin-top: 8px; }
.overflow-x { overflow-x: auto; }
.success-msg { background: var(--lt-green); color: var(--green); padding: 12px 16px; border-radius: 8px; margin-bottom: 12px; font-weight: 600; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
.qr-section { margin-top: 20px; padding: 20px; background: var(--gray); border-radius: 8px; }
.qr-display { display: flex; gap: 24px; align-items: flex-start; margin-top: 16px; flex-wrap: wrap; }
.qr-box { background: white; padding: 16px; border-radius: 8px; border: 1px solid var(--border); display: inline-block; }
.qr-info { flex: 1; min-width: 200px; }
.qr-print-card { background: white; padding: 40px; text-align: center; max-width: 400px; margin: 0 auto; }
.qr-print-card h2 { color: #006747; font-size: 24px; margin-bottom: 4px; }
.qr-print-card .course { color: #999; font-size: 14px; margin-bottom: 20px; }
.qr-print-card .instructions { font-size: 13px; color: #666; margin-top: 20px; line-height: 1.5; }
.qr-print-card .tagline { color: #006747; font-weight: 700; font-size: 16px; margin-top: 16px; }
@media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { position: absolute; left: 0; top: 0; width: 100%; } }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" async></script>
</head>
<body>
<div id="app"></div>
<script>

const SKEY="golf-pool-v1";
const DEF={name:"2025 Masters",course:"Augusta National Golf Club",par:72,numPicks:5,mainFee:100,pickFee:15,splits:[50,30,20],locked:false,deadline:"",winnerGolfer:"",winnerScore:null,publishedRounds:[false,false,false,false],appUrl:"",venmoHandle:"",zelleHandle:"",acceptCash:true,commissionerName:""};
const MASTERS_2026_FIELD=["Aberg", "Berger", "Bhatia", "Bradley", "Brennan", "Bridgeman", "Burns", "Cabrera", "Campbell", "Cantlay", "Clark", "Conners", "Couples", "Day", "DeChambeau", "Echavarria", "English", "Fang", "Fitzpatrick", "Fleetwood", "Fox", "Garcia", "Gerard", "Gotterup", "Greyserman", "Griffin", "Hall", "Harman", "Hatton", "Henley", "Herrington", "N. Hojgaard", "R. Hojgaard", "Holtz", "Homa", "Hovland", "Howell", "Im", "Jarvis", "D. Johnson", "Z. Johnson", "Kataoka", "Keefer", "M. Kim", "Si Woo Kim", "Kitayama", "Koepka", "Laopakdee", "Lee", "Li", "Lowry", "MacIntyre", "Matsuyama", "McCarty", "McIlroy", "McKibbin", "McNealy", "Mickelson", "Morikawa", "Neergaard-Petersen", "Noren", "Novak", "Olazabal", "Ortiz", "Penge", "Potgieter", "Pulcini", "Rahm", "Rai", "Reed", "Reitan", "Riley", "Rose", "Schauffele", "Scheffler", "Schwartzel", "Scott", "Singh", "Smith", "Spaun", "Spieth", "Stevens", "Straka", "Taylor", "Thomas", "Valimaki", "Watson", "Weir", "Willett", "Woodland", "Young"];
let S={mode:null,isAdmin:false,view:"leaderboard",config:{...DEF},golfers:[],entries:[],loaded:false,pinChecked:false,pinIsNew:false,pinErr:"",successMsg:"",editIdx:null,playerEmail:null,syncStatus:'',syncError:'',syncData:null,syncMatches:null,syncTournament:''};

let _PIN=null;
const _hasCS=!!(window.storage&&window.storage.get&&window.storage.set);
let _useAPI=false;
let _apiChecked=false;

async function _checkAPI(){
  if(_apiChecked)return;
  _apiChecked=true;
  try{const r=await fetch('/api/data',{method:'GET'});if(r.ok){_useAPI=true;}}catch(e){}
}

async function _get(k){
  if(_hasCS){try{const r=await window.storage.get(k);return r?r.value:null;}catch(e){}}
  if(_useAPI&&k===SKEY){try{const r=await fetch('/api/data');const d=await r.json();return JSON.stringify(d);}catch(e){}}
  try{const v=localStorage.getItem(k);return v;}catch(e){}
  return null;
}
async function _set(k,v){
  if(_hasCS){try{await window.storage.set(k,v);}catch(e){}}
  if(_useAPI&&k===SKEY){try{await fetch('/api/data',{method:'POST',headers:{'Content-Type':'application/json'},body:v});}catch(e){}}
  try{localStorage.setItem(k,v);}catch(e){}
}
async function load(){await _checkAPI();const raw=await _get(SKEY);if(raw){try{const d=JSON.parse(raw);if(d.config)S.config={...DEF,...d.config};S.golfers=Array.isArray(d.golfers)?d.golfers:[];S.entries=Array.isArray(d.entries)?d.entries:[];}catch(e){}}const p=await _get(SKEY+"-pin");if(p)_PIN=p;S.entries.forEach(e=>{if(!e.payStatus)e.payStatus='unpaid';if(!e.payMethod)e.payMethod='';});try{S.playerEmail=localStorage.getItem('best4-player-email')||null;}catch(e){}if(S.golfers.length===0){S.golfers=MASTERS_2026_FIELD.map(n=>({name:n,scores:[null,null,null,null],cutStatus:''}));save();}S.loaded=true;R();}
async function save(){await _set(SKEY,JSON.stringify({config:S.config,golfers:S.golfers,entries:S.entries}));}
async function checkPin(){
  if(!_PIN){try{const p=localStorage.getItem(SKEY+"-pin");if(p)_PIN=p;}catch(e){}}
  S.pinIsNew=!_PIN;S.pinChecked=true;R();
}
async function submitPin(pin,conf){
  if(S.pinIsNew){
    if(pin.length<4){S.pinErr="PIN must be at least 4 characters";R();return;}
    if(pin!==conf){S.pinErr="PINs don't match";R();return;}
    _PIN=pin;
    try{localStorage.setItem(SKEY+"-pin",pin);}catch(e){}
    S.isAdmin=true;S.view='setup';S.pinErr="";R();
  } else {
    if(pin===_PIN){S.isAdmin=true;S.view='setup';S.pinErr="";R();}
    else{S.pinErr="Wrong PIN";R();}
  }
}

function scoring(){
  const gM={};S.golfers.forEach(g=>gM[g.name]=g);
  const rp=[0,1,2,3].filter(r=>S.golfers.some(g=>g.scores[r]!=null&&g.scores[r]!=="")).length;
  const wvp=S.config.winnerScore!=null&&S.config.winnerScore!==""?S.config.winnerScore-S.config.par*4:null;
  const sc=S.entries.map(e=>{
    const pd=e.picks.map(pn=>{const g=gM[pn];if(!g)return{name:pn,total:0,isMC:false};return{name:pn,total:g.scores.reduce((s,v)=>s+(v||0),0),isMC:g.cutStatus==="MC"};});
    const mc=pd.filter(p=>p.isMC).length,elim=mc>=2;let b4=null,drop=null;
    if(!elim){if(mc===1){const a=pd.filter(p=>!p.isMC);b4=a.reduce((s,p)=>s+p.total,0);drop=pd.find(p=>p.isMC)?.name;}else{const so=[...pd].sort((a,b)=>b.total-a.total);drop=so[0]?.name;b4=so.slice(1).reduce((s,p)=>s+p.total,0);}}
    const vp=b4!=null?b4-S.config.par*4*rp:null,tbp=e.tbPrediction!=null&&e.tbPrediction!==""?Number(e.tbPrediction):null;
    const tbv=tbp!=null&&wvp!=null&&tbp>=wvp,tbd=tbp!=null&&wvp!=null?Math.abs(wvp-tbp):9999,comp=b4!=null?b4*1000000+(tbv?0:500000)+tbd:9999999999;
    return{...e,playerData:pd,mcCount:mc,eliminated:elim,best4:b4,droppedPlayer:drop,vsPar:vp,tbPred:tbp,tbValid:tbv,tbDiff:tbd,composite:comp};
  });
  sc.sort((a,b)=>a.composite-b.composite);let rank=1;
  sc.forEach((e,i)=>{if(e.eliminated){e.rank=null;return;}if(i>0&&e.composite===sc[i-1].composite)e.rank=sc[i-1].rank;else e.rank=rank;rank=i+2;});
  const pool=S.entries.length*S.config.mainFee,prizes=S.config.splits.map(p=>pool*p/100);
  sc.forEach(e=>{e.winnings=0;if(e.rank==null)return;const ties=sc.filter(o=>o.rank===e.rank).length;let ps=0;for(let pos=e.rank;pos<e.rank+ties&&pos<=prizes.length;pos++)ps+=prizes[pos-1];e.winnings=ps/ties;});
  return{scored:sc,roundsPlayed:rp,totalPool:pool,prizes,wvp};
}

function playerView(){
  const gM={};S.golfers.forEach(g=>gM[g.name]=g);const vis=[0,1,2,3].filter(i=>S.config.publishedRounds[i]),maxR=vis.length>0?Math.max(...vis):-1;
  const sc=S.entries.map(e=>{
    const pd=e.picks.map(pn=>{const g=gM[pn];if(!g)return{name:pn,total:0,isMC:false};return{name:pn,total:g.scores.reduce((s,v,ri)=>s+(vis.includes(ri)?(v||0):0),0),isMC:g.cutStatus==="MC"&&maxR>=1};});
    const mc=pd.filter(p=>p.isMC).length,elim=mc>=2;let b4=null,drop=null;
    if(!elim&&pd.some(p=>p.total>0)){if(mc===1){const a=pd.filter(p=>!p.isMC);b4=a.reduce((s,p)=>s+p.total,0);drop=pd.find(p=>p.isMC)?.name;}else{const so=[...pd].sort((a,b)=>b.total-a.total);drop=so[0]?.name;b4=so.slice(1).reduce((s,p)=>s+p.total,0);}}
    return{...e,playerData:pd,mcCount:mc,eliminated:elim,best4:b4,droppedPlayer:drop,vsPar:b4!=null?b4-S.config.par*vis.length*4:null};
  }).filter(e=>e.best4!=null).sort((a,b)=>(a.best4||9999)-(b.best4||9999));
  let rank=1;sc.forEach((e,i)=>{if(e.eliminated){e.rank=null;return;}if(i>0&&e.best4===sc[i-1].best4)e.rank=sc[i-1].rank;else e.rank=rank;rank=i+2;});
  return sc;
}

function $(tag,a,...c){const e=document.createElement(tag);if(a)Object.entries(a).forEach(([k,v])=>{if(k==='style'&&typeof v==='object')Object.assign(e.style,v);else if(k.startsWith('on')&&typeof v==='function')e.addEventListener(k.slice(2).toLowerCase(),v);else if(k==='className')e.className=v;else e.setAttribute(k,v);});c.flat(Infinity).forEach(ch=>{if(ch!=null&&ch!==false)e.append(typeof ch==='string'||typeof ch==='number'?String(ch):ch);});return e;}

function rLanding(){
  return $('div',{className:'landing'},
    $('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'20px',marginBottom:'24px'}},$('img',{src:CCC_LOGO,style:{width:'80px',height:'80px',objectFit:'contain'}}),logoSVG(1.4)),
    $('div',{className:'grid2',style:{gap:'16px'}},
      $('div',{className:'card role-card',style:{borderColor:'var(--green)',position:'relative'},onClick:()=>{S.mode='admin';checkPin();}},$('div',{style:{fontSize:'48px',marginBottom:'8px'}},'📋'),$('h3',{className:'hd'},'Commissioner Only'),$('p',{className:'sub'},S.config.commissionerName?S.config.commissionerName:'Set up and manage pool'),$('div',{style:{position:'absolute',bottom:'10px',right:'12px',fontSize:'18px',opacity:'0.5'}},'⛳')),
      $('div',{className:'card role-card',style:{borderColor:'var(--gold)',position:'relative'},onClick:()=>{S.mode='player';S.view='leaderboard';R();}},$('div',{style:{fontSize:'48px',marginBottom:'8px'}},'🏌️'),$('h3',{className:'hd',style:{color:'var(--dk-green)'}},'Player'),$('p',{className:'sub'},'Enter picks & view standings'),$('div',{style:{position:'absolute',bottom:'10px',right:'12px',fontSize:'18px',opacity:'0.5'}},'⛳'))
    ));
}

function rPin(){
  if(!S.pinChecked)return $('div',{className:'pin-box'},$('div',{className:'card'},$('p',{className:'sub'},'Checking...')));
  const card=$('div',{className:'card'});
  const pinLogo=$('div',{style:{marginBottom:'12px',display:'flex',flexDirection:'column',alignItems:'center',gap:'8px'}});pinLogo.append($('img',{src:CCC_LOGO,style:{width:'60px',height:'60px',objectFit:'contain'}}));pinLogo.append(logoSVG(0.9));card.append(pinLogo);card.append($('h2',{className:'hd'},'Commissioner access'));
  card.append($('p',{className:'sub',style:{marginBottom:'20px'}},S.pinIsNew?'Create your admin PIN':'Enter your PIN'));
  const pi=$('input',{type:'password',className:'pin-input',maxLength:'8',placeholder:'• • • •'});card.append(pi);
  let ci;if(S.pinIsNew){ci=$('input',{type:'password',className:'pin-input',maxLength:'8',placeholder:'Confirm',style:{marginTop:'12px'}});card.append(ci);}
  if(S.pinErr)card.append($('p',{className:'err'},S.pinErr));
  const go=()=>submitPin(pi.value,ci?ci.value:'');
  pi.addEventListener('keydown',e=>{if(e.key==='Enter')go();});
  if(ci)ci.addEventListener('keydown',e=>{if(e.key==='Enter')go();});
  card.append($('button',{className:'btn btn-p',style:{width:'100%',marginTop:'16px'},onClick:go},S.pinIsNew?'Set PIN & enter':'Enter'));
  card.append($('button',{className:'btn btn-o',style:{width:'100%',marginTop:'8px'},onClick:()=>{S.mode=null;S.pinChecked=false;S.pinErr="";R();}},'← Back'));
  return $('div',{className:'pin-box'},card);
}

function rTopbar(){
  const tabs=S.isAdmin?['setup','golfers','entries','scores','leaderboard','payouts','announce','archive']:['leaderboard','enter','whatif','rules'];
  const bar=$('div',{className:'topbar',style:{position:'relative'}});
  bar.append($('img',{src:CCC_LOGO,style:{position:'absolute',bottom:'6px',right:'16px',width:'28px',height:'28px',objectFit:'contain',opacity:'0.85'}}));
  const inner=$('div',{className:'topbar-inner'},
    $('div',{style:{display:'flex',alignItems:'center',gap:'10px'}},logoSVG(0.7,true),$('p',{className:'st'},S.config.name||'')),
    $('div',{className:'nav'},
      $('button',{className:'pill',style:{borderColor:'rgba(255,255,255,0.3)',color:'rgba(255,255,255,0.6)',marginRight:'8px'},onClick:()=>{S.isAdmin=false;S.mode=null;S.view='leaderboard';S.pinChecked=false;S.editIdx=null;R();}},'\u2190 Exit'),
      ...tabs.map(t=>$('button',{className:'pill'+(S.view===t?' on':''),onClick:()=>{S.view=t;S.editIdx=null;S.successMsg="";R();}},(t==='whatif'?'What If':t==='announce'?'Announce':t==='archive'?'Archive':t.charAt(0).toUpperCase()+t.slice(1))))
    ));
  bar.append(inner);
  return bar;
}

function rSetup(){
  const c=S.config;
  const mf=(label,key,type,val)=>{const d=$('div',null,$('label',{className:'lbl'},label));const inp=$('input',{type,value:val!=null?String(val):''});inp.addEventListener('change',()=>{S.config[key]=type==='number'?(inp.value===''?null:+inp.value):inp.value;save();});d.append(inp);return d;};
  const sf=(label,idx)=>{const d=$('div',null,$('label',{className:'lbl'},label));const inp=$('input',{type:'number',value:String(c.splits[idx])});inp.addEventListener('change',()=>{const sp=[...c.splits];sp[idx]=+inp.value;S.config.splits=sp;save();});d.append(inp);return d;};
  const card=$('div',{className:'card'});card.append($('h2',{className:'hd'},'Tournament setup'));
  const g=$('div',{className:'grid2',style:{marginTop:'16px'}});
  const tournD=$('div',{style:{gridColumn:'1 / -1'}},
    $('label',{className:'lbl'},'Tournament'));
  const tournSel=$('select');
  tournSel.append($('option',{value:'custom'},'Custom'));
  Object.entries(TOURNAMENTS).forEach(([k,v])=>{if(k==='custom')return;const o=$('option',{value:k},v.label);if(c.tournament===k)o.selected=true;tournSel.append(o);});
  if(!c.tournament)tournSel.value='custom';
  tournSel.addEventListener('change',()=>{
    const t=TOURNAMENTS[tournSel.value];
    if(t&&tournSel.value!=='custom'){
      S.config.tournament=tournSel.value;
      S.config.name=t.name;S.config.course=t.course;S.config.par=t.par;S.config.theme=t.theme;
    } else {
      S.config.tournament='custom';
    }
    save();R();
  });
  tournD.append(tournSel);
  g.append(mf('Commissioner name','commissionerName','text',c.commissionerName),tournD,mf('Tournament name','name','text',c.name),mf('Course','course','text',c.course),mf('Par (per round)','par','number',c.par),mf('Picks per entry','numPicks','number',c.numPicks),mf('Main pool entry fee ($)','mainFee','number',c.mainFee),mf('Pick the winner fee ($)','pickFee','number',c.pickFee),sf('1st place %',0),sf('2nd place %',1),sf('3rd place %',2));
  const dlf=$('div',null,$('label',{className:'lbl'},'Entry deadline'));const dli=$('input',{type:'datetime-local',value:c.deadline||''});dli.addEventListener('change',()=>{S.config.deadline=dli.value;save();});dlf.append(dli);g.append(dlf);
  card.append(g);

  const paySec=$('div',{style:{marginTop:'20px',padding:'16px',background:'var(--gray)',borderRadius:'8px'}});
  paySec.append($('h3',{className:'hd'},'Payment info (shown to players)'));
  const payG=$('div',{className:'grid2',style:{marginTop:'12px'}});
  const vmInp=$('input',{type:'text',value:c.venmoHandle||'',placeholder:'@your-venmo'});
  vmInp.addEventListener('change',()=>{S.config.venmoHandle=vmInp.value.trim();save();});
  payG.append($('div',null,$('label',{className:'lbl'},'Venmo handle'),vmInp));
  const zlInp=$('input',{type:'text',value:c.zelleHandle||'',placeholder:'phone or email'});
  zlInp.addEventListener('change',()=>{S.config.zelleHandle=zlInp.value.trim();save();});
  payG.append($('div',null,$('label',{className:'lbl'},'Zelle handle'),zlInp));
  paySec.append(payG);card.append(paySec);

async function espnSync(){
  S.syncStatus='loading';S.syncError='';R();
  try{
    let data;
    const proxyUrl='/api/espn';
    const directUrl='https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard';
    try{const r=await fetch(proxyUrl);data=await r.json();}
    catch(e){const r=await fetch(directUrl);data=await r.json();}

    if(!data||!data.events||!data.events.length){S.syncStatus='error';S.syncError='No active tournament found';R();return;}

    const evt=data.events[0];
    const comp=evt.competitions&&evt.competitions[0];
    if(!comp||!comp.competitors){S.syncStatus='error';S.syncError='No competitor data';R();return;}

    S.syncTournament=evt.name||'Unknown';
    S.syncData=[];
    comp.competitors.forEach(c=>{
      const name=c.athlete&&c.athlete.displayName?c.athlete.displayName:'';
      const lastName=name.split(' ').slice(-1)[0];
      const status=c.status&&c.status.type?c.status.type.name:'';
      const isCut=status==='cut'||status==='CUT';
      const rounds=[];
      if(c.linescores){c.linescores.forEach((ls,i)=>{rounds[i]=ls.value!=null?ls.value:null;});}
      const total=rounds.reduce((s,v)=>s+(v||0),0);
      S.syncData.push({fullName:name,lastName,rounds,total,isCut,status});
    });

    // Try to match with existing golfers
    S.syncMatches=[];
    S.syncData.forEach(sd=>{
      const match=S.golfers.find(g=>g.name.toLowerCase()===sd.lastName.toLowerCase())||
                  S.golfers.find(g=>sd.fullName.toLowerCase().includes(g.name.toLowerCase()))||
                  S.golfers.find(g=>g.name.toLowerCase().includes(sd.lastName.toLowerCase()));
      if(match){
        const changes=[];
        [0,1,2,3].forEach(r=>{if(sd.rounds[r]!=null&&sd.rounds[r]!==match.scores[r])changes.push('R'+(r+1)+': '+(match.scores[r]||'—')+' → '+sd.rounds[r]);});
        if(sd.isCut&&match.cutStatus!=='MC')changes.push('Cut: → MC');
        if(changes.length)S.syncMatches.push({espn:sd,local:match,changes,localIdx:S.golfers.indexOf(match)});
      }
    });

    S.syncStatus='preview';R();
  }catch(e){S.syncStatus='error';S.syncError='Sync failed: '+e.message;R();}
}

async function espnImportField(){
  S.syncStatus='loading';S.syncError='';R();
  try{
    let data;
    const proxyUrl='/api/espn';
    const directUrl='https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard';
    try{const r=await fetch(proxyUrl);data=await r.json();}
    catch(e){try{const r2=await fetch(directUrl);data=await r2.json();}catch(e2){}}
    if(!data||!data.events||!data.events.length){S.syncStatus=null;alert('No active tournament found on ESPN.');R();return;}
    const evt=data.events[0];
    const comp=evt.competitions&&evt.competitions[0];
    if(!comp||!comp.competitors){S.syncStatus=null;alert('No competitor data found.');R();return;}
    const names=[];
    comp.competitors.forEach(c=>{
      const full=c.athlete&&c.athlete.displayName?c.athlete.displayName:'';
      const last=full.split(' ').slice(-1)[0];
      if(last&&!S.golfers.find(g=>g.name.toLowerCase()===last.toLowerCase()))
        names.push(last);
    });
    if(!names.length){alert('All golfers already in your field (matched '+comp.competitors.length+' players).');S.syncStatus=null;R();return;}
    if(!confirm('Import '+names.length+' golfers from '+evt.name+'?')){S.syncStatus=null;R();return;}
    names.forEach(n=>{S.golfers.push({name:n,scores:[null,null,null,null],cutStatus:''});});
    S.golfers.sort((a,b)=>a.name.localeCompare(b.name));
    save();S.syncStatus=null;S.successMsg=names.length+' golfers imported!';R();
  }catch(e){S.syncStatus=null;alert('Failed: '+e.message);R();}
}

function applySyncData(){
  S.syncMatches.forEach(m=>{
    [0,1,2,3].forEach(r=>{if(m.espn.rounds[r]!=null)S.golfers[m.localIdx].scores[r]=m.espn.rounds[r];});
    if(m.espn.isCut)S.golfers[m.localIdx].cutStatus='MC';
    else if(S.golfers[m.localIdx].cutStatus!=='MC'&&m.espn.rounds.filter(r=>r!=null).length>=2)S.golfers[m.localIdx].cutStatus='MADE';
  });
  S.syncStatus='applied';
  // Auto-populate winner after R4
  const allR4=S.golfers.filter(g=>g.cutStatus!=='MC'&&g.scores[3]!=null&&g.scores[3]!=='');
  if(allR4.length>0){
    const withTotals=allR4.map(g=>({name:g.name,total:g.scores.reduce((s,v)=>s+(v||0),0)}));
    withTotals.sort((a,b)=>a.total-b.total);
    if(withTotals[0]){
      S.config.winnerGolfer=withTotals[0].name;
      S.config.winnerScore=withTotals[0].total;
    }
  }
  save();R();
}

function rWhatIf(){
  const frag=document.createDocumentFragment();

  // Get all picked golfers
  const pickedNames=new Set();
  S.entries.forEach(e=>e.picks.forEach(p=>pickedNames.add(p)));
  const pickedGolfers=S.golfers.filter(g=>pickedNames.has(g.name)).sort((a,b)=>a.name.localeCompare(b.name));

  if(!pickedGolfers.length){
    const card=$('div',{className:'card'});
    card.append($('h2',{className:'hd'},'What If'));
    card.append($('p',{className:'sub'},'No entries or golfers loaded yet.'));
    frag.append(card);return frag;
  }

  // Figure out which rounds have real data
  const roundsWithData=[0,1,2,3].map(r=>S.golfers.some(g=>g.scores[r]!=null));
  const futureRounds=[0,1,2,3].filter(r=>!roundsWithData[r]);

  // Build hypothetical scores state (clone from actuals)
  if(!S._wif||S._wifReset){
    S._wif={};
    pickedGolfers.forEach(g=>{S._wif[g.name]=[g.scores[0],g.scores[1],g.scores[2],g.scores[3]];});
    S._wifCuts={};
    pickedGolfers.forEach(g=>{S._wifCuts[g.name]=g.cutStatus;});
    S._wifReset=false;
  }

  // Scoring card
  const card=$('div',{className:'card'});
  card.append($('h2',{className:'hd'},'What If'));
  card.append($('p',{className:'sub',style:{margin:'4px 0 12px'}},'Adjust hypothetical scores for future rounds. The projected leaderboard updates instantly.'));

  const resetBtn=$('button',{className:'btn btn-o',style:{fontSize:'12px',marginBottom:'12px'},onClick:()=>{S._wifReset=true;R();}});
  resetBtn.textContent='Reset all';
  card.append(resetBtn);

  const wrap=$('div',{className:'overflow-x'});
  const tbl=$('table');
  const hrow=$('tr');
  hrow.append($('th',{className:'left'},'Golfer'));
  ['R1','R2','R3','R4'].forEach((l,i)=>hrow.append($('th',{style:!roundsWithData[i]?{background:'var(--gold)',color:'var(--dk-green)'}:{}},(roundsWithData[i]?l:l+' ?'))));
  hrow.append($('th',null,'Total'),$('th',null,'Cut?'));
  tbl.append($('thead',null,hrow));

  const tbody=$('tbody');
  pickedGolfers.forEach(g=>{
    const row=$('tr');
    const entryCount=S.entries.filter(e=>e.picks.includes(g.name)).length;
    const nameCell=$('td',{className:'left'});
    nameCell.append($('span',{style:{fontWeight:'600'}},g.name));
    nameCell.append($('span',{style:{fontSize:'11px',color:'var(--med)',marginLeft:'6px'}},'('+entryCount+')'));
    row.append(nameCell);

    const wScores=S._wif[g.name]||[null,null,null,null];
    [0,1,2,3].forEach(r=>{
      const td=$('td');
      {
        const inp=$('input',{type:'number',className:'score-input',style:{background:roundsWithData[r]?'#fff':'#FFF8E1',borderColor:roundsWithData[r]?'var(--border)':'var(--gold)'},value:wScores[r]!=null?String(wScores[r]):''});
        inp.addEventListener('change',()=>{
          if(!S._wif[g.name])S._wif[g.name]=[g.scores[0],g.scores[1],g.scores[2],g.scores[3]];
          S._wif[g.name][r]=inp.value===''?null:+inp.value;
          updateWhatIfLeaderboard();
        });
        td.append(inp);
      }
      row.append(td);
    });

    const total=wScores.reduce((s,v)=>s+(v||0),0);
    row.append($('td',{style:{fontWeight:'700'}},total||''));

    const cutTd=$('td');
    const cutStatus=S._wifCuts[g.name]||g.cutStatus;
    if(S.isAdmin&&roundsWithData[1]){
      const cutSel=$('select',{className:'cut-sel'});
      [['','—'],['MADE','Made'],['MC','MC']].forEach(([v,l])=>{
        const o=$('option',{value:v},l);
        if(cutStatus===v)o.selected=true;
        cutSel.append(o);
      });
      cutSel.addEventListener('change',()=>{S._wifCuts[g.name]=cutSel.value;updateWhatIfLeaderboard();});
      cutTd.append(cutSel);
    } else if(cutStatus==='MC'){cutTd.append($('span',{className:'badge bg-lr'},'MC'));
    } else if(cutStatus==='MADE'){cutTd.append($('span',{className:'badge bg-lg'},'Made'));
    } else cutTd.textContent='—';
    row.append(cutTd);
    tbody.append(row);
  });
  tbl.append(tbody);wrap.append(tbl);card.append(wrap);
  frag.append(card);

  // Projected leaderboard
  const lbCard=$('div',{className:'card',id:'wif-leaderboard'});
  lbCard.append($('h2',{className:'hd'},'Projected leaderboard'));
  lbCard.append(buildWhatIfLeaderboard());
  frag.append(lbCard);

  return frag;
}

function buildWhatIfLeaderboard(){
  const gMap={};
  S.golfers.forEach(g=>{
    const wScores=S._wif&&S._wif[g.name]?S._wif[g.name]:g.scores;
    const wCut=S._wifCuts&&S._wifCuts[g.name]?S._wifCuts[g.name]:g.cutStatus;
    gMap[g.name]={name:g.name,scores:wScores,cutStatus:wCut};
  });

  const roundsPlayed=[0,1,2,3].filter(r=>S.golfers.some(g=>{
    const ws=S._wif&&S._wif[g.name]?S._wif[g.name]:g.scores;
    return ws[r]!=null&&ws[r]!=='';
  })).length;

  // Also calc current actual ranks for comparison
  const {scored:actualScored}=scoring();
  const actualRankMap={};
  actualScored.forEach(e=>{if(e.rank)actualRankMap[e.id]=e.rank;});

  const sc=S.entries.map(e=>{
    const pd=e.picks.map(pn=>{
      const g=gMap[pn];
      if(!g)return{name:pn,total:0,isMC:false};
      const _ws=S._wif&&S._wif[pn]?S._wif[pn]:g.scores;const _wc=S._wifCuts&&S._wifCuts[pn]?S._wifCuts[pn]:g.cutStatus;return{name:pn,total:_ws.reduce((s,v)=>s+(v||0),0),isMC:_wc==='MC'};
    });
    const mc=pd.filter(p=>p.isMC).length,elim=mc>=2;
    let b4=null,drop=null;
    if(!elim){
      if(mc===1){const a=pd.filter(p=>!p.isMC);b4=a.reduce((s,p)=>s+p.total,0);drop=pd.find(p=>p.isMC)?.name;}
      else{const so=[...pd].sort((a,b)=>b.total-a.total);drop=so[0]?.name;b4=so.slice(1).reduce((s,p)=>s+p.total,0);}
    }
    const vp=b4!=null?b4-S.config.par*4*roundsPlayed:null;
    return{...e,mcCount:mc,eliminated:elim,best4:b4,droppedPlayer:drop,vsPar:vp};
  }).sort((a,b)=>(a.best4||9999999)-(b.best4||9999999));

  let rank=1;
  sc.forEach((e,i)=>{if(e.eliminated){e.rank=null;return;}if(i>0&&e.best4===sc[i-1].best4)e.rank=sc[i-1].rank;else e.rank=rank;rank=i+2;});

  const div=$('div',{className:'overflow-x',style:{marginTop:'12px'}});
  const tbl=$('table');
  tbl.append($('thead',null,$('tr',null,...['#','','Participant','Score','vs Par','+PP','Cuts','Dropped'].map((t,i)=>$('th',{className:i===2||i===6?'left':''},t)))));

  const tbody=$('tbody');
  const isA=S.isAdmin;
  sc.forEach(e=>{
    const isMe=!isA&&S.playerEmail&&e.email&&e.email.toLowerCase()===S.playerEmail.toLowerCase();
    const bg=e.eliminated?'var(--lt-red)':(isMe?'#FFF8E1':(e.rank&&e.rank<=3?'var(--lt-green)':'transparent'));
    const row=$('tr',{style:{background:bg}});
    row.append($('td',{style:{fontWeight:'700'}},e.eliminated?'—':String(e.rank||'')));

    // Movement arrow
    const oldRank=actualRankMap[e.id];
    const mvTd=$('td',{style:{fontSize:'14px',width:'24px'}});
    if(e.rank&&oldRank){
      const diff=oldRank-e.rank;
      if(diff>0)mvTd.append($('span',{style:{color:'var(--green)',fontWeight:'700'}},'\u2191'+diff));
      else if(diff<0)mvTd.append($('span',{style:{color:'var(--red)',fontWeight:'700'}},'\u2193'+Math.abs(diff)));
      else mvTd.textContent='—';
    } else if(e.eliminated&&!actualRankMap[e.id]){mvTd.textContent='';} 
    else mvTd.textContent='';
    row.append(mvTd);

    const nt=$('td',{className:'left'});
    const nameRow=$('div',{style:{fontWeight:'600',display:'flex',alignItems:'center',gap:'6px'}});
    nameRow.append(document.createTextNode(e.participant));
    if(isMe)nameRow.append($('span',{className:'badge',style:{background:'var(--gold)',color:'var(--dk-green)',fontSize:'9px'}},'YOU'));
    nt.append(nameRow,$('div',{style:{fontSize:'11px',color:'var(--med)'}},e.picks.join(' \u00b7 ')));
    row.append(nt);

    row.append($('td',{style:{fontWeight:'700',fontSize:'15px'}},e.eliminated?'ELIM':(e.best4!=null?String(e.best4):'—')));
    const vs=e.vsPar!=null?(e.vsPar>0?'+'+e.vsPar:e.vsPar===0?'E':String(e.vsPar)):'';
    row.append($('td',{style:{color:(e.vsPar||0)<0?'var(--red)':'var(--dk)',fontWeight:'600'}},vs));
    const wifGolfers=S.golfers.map(g=>{
      const ws=S._wif&&S._wif[g.name]?S._wif[g.name]:g.scores;
      const wc=S._wifCuts&&S._wifCuts[g.name]?S._wifCuts[g.name]:g.cutStatus;
      return{name:g.name,scores:ws,cutStatus:wc};
    });
    const wpp=calcPerfectPick(wifGolfers);
    const wppDiff=(!e.eliminated&&e.best4!=null&&wpp.score>0)?e.best4-wpp.score:null;
    row.append($('td',{style:{fontSize:'12px',color:wppDiff!=null?(wppDiff<=5?'var(--green)':wppDiff<=15?'var(--dk)':'var(--red)'):'var(--med)'}},wppDiff!=null?'+'+wppDiff:'—'));
    const ct=$('td');
    if(e.mcCount>0)ct.append($('span',{className:'badge '+(e.mcCount>=2?'bg-lr':'bg-warn')},e.mcCount+' MC'));
    else ct.textContent='0';
    row.append(ct);
    row.append($('td',{className:'left',style:{fontSize:'12px'}},e.droppedPlayer||(e.eliminated?'N/A':'—')));
    tbody.append(row);
  });
  tbl.append(tbody);div.append(tbl);
  return div;
}

function updateWhatIfLeaderboard(){
  const lb=document.getElementById('wif-leaderboard');
  if(!lb)return;
  while(lb.children.length>1)lb.removeChild(lb.lastChild);
  lb.append(buildWhatIfLeaderboard());
}


function calcPerfectPick(golferSource,pubRounds){
  const gs=golferSource||S.golfers;
  const pr=pubRounds||[0,1,2,3].filter(r=>S.config.publishedRounds&&S.config.publishedRounds[r]);
  if(!pr.length)return{score:0,names:[]};
  const made=gs.filter(g=>g.cutStatus!=='MC');
  const totals=made.map(g=>{
    let t=0;pr.forEach(r=>{t+=(g.scores[r]||0);});
    return{name:g.name,total:t};
  }).filter(t=>t.total>0);
  totals.sort((a,b)=>a.total-b.total);
  const best4=totals.slice(0,4);
  return{score:best4.reduce((s,g)=>s+g.total,0),names:best4.map(g=>g.name)};
}

function applyTheme(){
  const t=THEMES[S.config.theme]||THEMES.default;
  let el=document.getElementById('theme-css');
  if(!el){el=document.createElement('style');el.id='theme-css';document.head.append(el);}
  el.textContent=
    ':root{--green:'+t.primary+';--dk-green:'+t.dk+';--gold:'+t.accent+';--lt-green:'+t.ltBg+';}'+
    '.topbar{background:'+t.primary+' !important;}'+
    'th{background:'+t.primary+' !important;}'+
    'h2.hd, h3.hd{color:'+t.primary+' !important;}'+
    '.pill.on{background:'+t.accent+' !important;border-color:'+t.accent+' !important;color:#fff !important;}'+
    '.btn-p{background:'+t.primary+' !important;}'+
    '.btn-g{background:'+t.accent+' !important;color:#fff !important;}'+
    '.btn-o{border-color:'+t.primary+' !important;color:'+t.primary+' !important;}'+
    '.pub-box.on{border-color:'+t.primary+' !important;background:'+t.ltBg+' !important;}'+
    '.bg-lg{background:'+t.ltBg+' !important;color:'+t.primary+' !important;}'+
    '.metric .val{color:'+t.primary+' !important;}'+
    '.role-card{border-color:'+t.primary+' !important;}'+
    '.landing h1{color:'+t.accent+' !important;}'+
    '.success-msg{background:'+t.ltBg+' !important;color:'+t.primary+' !important;}'+
    'input:focus,select:focus{border-color:'+t.primary+' !important;}';
}


function rArchive(){
  const frag=document.createDocumentFragment();
  const card=$('div',{className:'card'});
  card.append($('h2',{className:'hd'},'Tournament archive'));
  card.append($('p',{className:'sub',style:{margin:'4px 0 16px'}},'Archive current results and start a new tournament. Archived data is saved and viewable.'));

  // Archive current button
  if(S.entries.length>0){
    const archBtn=$('button',{className:'btn btn-g',style:{fontSize:'16px',padding:'12px 24px'},onClick:async ()=>{
      if(!confirm('Archive "'+S.config.name+'" and reset for a new tournament?\n\nThis saves all current entries, scores, and results. Your config (fees, splits, handles) stays intact.'))return;
      const archive={
        id:Date.now().toString(),
        date:new Date().toLocaleDateString(),
        name:S.config.name,
        course:S.config.course,
        config:{...S.config},
        golfers:[...S.golfers],
        entries:[...S.entries],
        winnerGolfer:S.config.winnerGolfer,
        winnerScore:S.config.winnerScore
      };
      let archives=[];
      try{const raw=await _get(SKEY+'-archives');if(raw)archives=JSON.parse(raw);}catch(e){}
      archives.unshift(archive);
      await _set(SKEY+'-archives',JSON.stringify(archives));
      S.golfers=[];S.entries=[];
      S.config.name='';S.config.course='';S.config.tournament='custom';
      S.config.winnerGolfer='';S.config.winnerScore=null;
      S.config.publishedRounds=[false,false,false,false];S.config.locked=false;
      save();S.successMsg='Archived! Ready for new tournament.';S.view='setup';R();
    }});archBtn.textContent='Archive "'+S.config.name+'" & start new';
    card.append(archBtn);
    card.append($('p',{className:'sub',style:{marginTop:'8px'}},'Saves: '+S.entries.length+' entries, '+S.golfers.length+' golfers, all scores and payouts.'));
  } else {
    card.append($('p',{className:'sub'},'No current tournament to archive.'));
  }

  frag.append(card);

  // Past archives
  const listCard=$('div',{className:'card',id:'archive-list'});
  listCard.append($('h2',{className:'hd',style:{fontSize:'18px'}},'Past tournaments'));
  loadArchives(listCard);
  frag.append(listCard);
  return frag;
}

async function loadArchives(container){
  let archives=[];
  try{const raw=await _get(SKEY+'-archives');if(raw)archives=JSON.parse(raw);}catch(e){}
  if(!archives.length){container.append($('p',{className:'sub'},'No archived tournaments yet.'));return;}

  archives.forEach((a,idx)=>{
    const row=$('div',{style:{padding:'16px',background:idx%2===0?'var(--gray)':'white',borderRadius:'8px',marginTop:'8px'}});
    const hdr=$('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}});
    hdr.append($('div',null,
      $('div',{style:{fontWeight:'700',fontSize:'16px',color:'var(--green)'}},a.name||'Unnamed'),
      $('div',{className:'sub'},a.course+' — '+a.date)
    ));

    const btns=$('div',{style:{display:'flex',gap:'6px'}});
    const viewBtn=$('button',{className:'btn btn-o',style:{fontSize:'11px',padding:'4px 10px'},onClick:()=>{
      toggleArchiveDetail(a,row);
    }});viewBtn.textContent='View results';

    const dlBtn=$('button',{className:'btn btn-o',style:{fontSize:'11px',padding:'4px 10px'},onClick:()=>{
      const blob=new Blob([JSON.stringify(a,null,2)],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const link=document.createElement('a');link.href=url;link.download=(a.name||'tournament').replace(/\s+/g,'_')+'_results.json';
      link.click();URL.revokeObjectURL(url);
    }});dlBtn.textContent='Download';

    const delBtn=$('button',{className:'btn btn-d',style:{fontSize:'11px',padding:'4px 10px'},onClick:async ()=>{
      if(!confirm('Delete archived results for "'+a.name+'"? This cannot be undone.'))return;
      let arcs=[];try{const raw=await _get(SKEY+'-archives');if(raw)arcs=JSON.parse(raw);}catch(e){}
      arcs=arcs.filter(x=>x.id!==a.id);
      await _set(SKEY+'-archives',JSON.stringify(arcs));R();
    }});delBtn.textContent='Delete';

    btns.append(viewBtn,dlBtn,delBtn);
    hdr.append(btns);row.append(hdr);

    // Summary stats
    const stats=$('div',{style:{display:'flex',gap:'12px',flexWrap:'wrap',fontSize:'13px'}});
    stats.append($('span',null,'Entries: '+a.entries.length));
    stats.append($('span',null,'Golfers: '+a.golfers.length));
    if(a.winnerGolfer)stats.append($('span',{style:{color:'var(--green)',fontWeight:'600'}},'Winner: '+a.winnerGolfer));
    const pool=a.entries.length*(a.config.mainFee||100);
    stats.append($('span',null,'Pool: $'+pool.toLocaleString()));
    row.append(stats);
    container.append(row);
  });
}

function toggleArchiveDetail(a,row){
  const existing=row.querySelector('.archive-detail');
  if(existing){existing.remove();return;}

  const detail=$('div',{className:'archive-detail',style:{marginTop:'12px',padding:'12px',background:'white',borderRadius:'6px',border:'1px solid var(--border)'}});

  // Leaderboard from archive
  const gMap={};a.golfers.forEach(g=>gMap[g.name]=g);
  const rp=[0,1,2,3].filter(r=>a.golfers.some(g=>g.scores[r]!=null)).length;

  const scored=a.entries.map(e=>{
    const pd=e.picks.map(pn=>{const g=gMap[pn];if(!g)return{name:pn,total:0,isMC:false};return{name:pn,total:g.scores.reduce((s,v)=>s+(v||0),0),isMC:g.cutStatus==='MC'};});
    const mc=pd.filter(p=>p.isMC).length,elim=mc>=2;let b4=null,drop=null;
    if(!elim){if(mc===1){const alive=pd.filter(p=>!p.isMC);b4=alive.reduce((s,p)=>s+p.total,0);drop=pd.find(p=>p.isMC)?.name;}
    else{const so=[...pd].sort((x,y)=>y.total-x.total);drop=so[0]?.name;b4=so.slice(1).reduce((s,p)=>s+p.total,0);}}
    return{...e,mcCount:mc,eliminated:elim,best4:b4,droppedPlayer:drop};
  }).filter(e=>e.best4!=null).sort((x,y)=>x.best4-y.best4);

  let rank=1;scored.forEach((e,i)=>{if(e.eliminated){e.rank=null;return;}if(i>0&&e.best4===scored[i-1].best4)e.rank=scored[i-1].rank;else e.rank=rank;rank=i+2;});

  const tbl=$('table',{style:{fontSize:'12px'}});
  tbl.append($('thead',null,$('tr',null,...['#','Participant','Score','Picks','Dropped'].map((t,i)=>$('th',{className:i===1||i===3?'left':''},t)))));
  const tb=$('tbody');
  scored.slice(0,20).forEach(e=>{
    const row2=$('tr',{style:{background:e.rank&&e.rank<=3?'var(--lt-green)':'transparent'}});
    row2.append($('td',{style:{fontWeight:'700'}},e.rank?String(e.rank):'—'));
    row2.append($('td',{className:'left',style:{fontWeight:'600'}},e.participant));
    row2.append($('td',{style:{fontWeight:'700'}},e.best4!=null?String(e.best4):'—'));
    row2.append($('td',{className:'left',style:{fontSize:'11px',color:'var(--med)'}},e.picks.join(' \u00b7 ')));
    row2.append($('td',{style:{fontSize:'11px'}},e.droppedPlayer||'—'));
    tb.append(row2);
  });
  tbl.append(tb);
  if(scored.length>20)detail.append($('p',{className:'sub'},'Showing top 20 of '+scored.length));
  detail.append(tbl);
  row.append(detail);
}

  html+='*{margin:0;padding:0;box-sizing:border-box;}';
  html+='@page{size:letter;margin:0;}';
  html+='.page{position:relative;width:8.5in;height:11in;page-break-after:always;overflow:hidden;}';
  /* Three zones locked to exact thirds via top positioning */
  html+='.zone{position:absolute;width:8.5in;height:3.6667in;display:flex;align-items:center;justify-content:center;}';
  html+='.zone:nth-child(1){top:0;}';
  html+='.zone:nth-child(2){top:3.6667in;}';
  html+='.zone:nth-child(3){top:7.3333in;}';
  html+='.receipt{width:7.8in;height:3.1in;display:flex;border:1px solid #ccc;border-radius:6px;overflow:hidden;}';
  html+='.half{flex:1;padding:12px 16px;display:flex;flex-direction:column;justify-content:space-between;}';
  html+='.commissioner{border-left:1px dashed #bbb;background:#fafafa;}';
  html+='.copy-tag{font-size:8px;text-transform:uppercase;letter-spacing:1px;color:#aaa;text-align:right;margin-bottom:4px;}';
  html+='.brand{display:flex;align-items:center;gap:6px;}';
  html+='.badge{width:26px;height:26px;background:#1B2A6B;border-radius:3px;display:flex;align-items:center;justify-content:center;color:white;font-size:8px;font-weight:700;}';
  html+='.bname{font-family:Georgia,serif;font-size:13px;font-weight:700;color:#006747;}';
  html+='.bname span{color:#D4A017;}';
  html+='.rnum{font-size:20px;font-weight:700;color:#006747;}';
  html+='.tname{font-size:11px;font-weight:600;color:#333;margin-top:4px;}';
  html+='.fields{display:flex;flex-direction:column;gap:5px;margin-top:4px;}';
  html+='.field label{font-size:8px;text-transform:uppercase;color:#999;letter-spacing:0.5px;display:block;margin-bottom:1px;}';
  html+='.field .line{border-bottom:1px solid #ccc;height:16px;width:100%;}';
  html+='.row2{display:flex;gap:10px;}';
  html+='.row2 .field{flex:1;}';
  html+='.footer{display:flex;justify-content:space-between;align-items:center;}';
  html+='.stamp{font-size:10px;font-weight:700;color:#006747;border:1.5px solid #006747;padding:2px 7px;border-radius:3px;}';
  html+='.amt label{font-size:8px;text-transform:uppercase;color:#999;letter-spacing:0.5px;display:block;}';
  html+='.amt .val{font-size:15px;font-weight:700;color:#222;}';
  html+='</style></head><body>';

  const halfHTML=(numStr,label)=>
    '<div class="half'+(label==='COMMISSIONER'?' commissioner':'')+'">'
    +'<div>'
    +'<div class="copy-tag">'+label+' COPY</div>'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start;">'
    +'<div class="brand"><div class="badge">CCC</div><div class="bname">best<span style=\"color:#D4A017\">4</span>.golf</div></div>'
    +'<div class="rnum">#'+numStr+'</div>'
    +'</div>'
    +'<div class="tname">'+c.name+'</div>'
    +'</div>'
    +'<div class="fields">'
    +'<div class="field"><label>Player name</label><div class="line"></div></div>'
    +'<div class="row2">'
    +'<div class="field"><label>Entry #</label><div class="line"></div></div>'
    +'<div class="field"><label>Date</label><div class="line"></div></div>'
    +'</div>'
    +'<div class="field"><label>Received by</label><div class="line"></div></div>'
    +'</div>'
    +'<div class="footer">'
    +'<div class="stamp">PAID — Cash at Grill Bar</div>'
    +'<div class="amt"><label>Amount</label><div class="val">$'+c.mainFee+'</div></div>'
    +'</div>'
    +'</div>';

  for(let p=0;p<pages;p++){
    html+='<div class="page">';
    for(let r=0;r<perPage;r++){

function printWinnerSlips(){
  const sc2=scoring();
  const winners=sc2.scored.filter(e=>e.winnings>0).sort((a,b)=>a.rank-b.rank);
  if(!winners.length){alert('No winners to print.');return;}
  const w=window.open('','_blank','width=850,height=1100');
  w.document.write('<!DOCTYPE html><html><head><title>Winner Slips</title><style>');
  w.document.write('body{font-family:Arial,sans-serif;margin:0;padding:0;}');
  w.document.write('.slip{width:7in;margin:0.3in auto;padding:24px 32px;border:2px solid #006747;border-radius:12px;page-break-inside:avoid;}');
  w.document.write('.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}');
  w.document.write('.logo-row img{width:40px;height:40px;}');
  w.document.write('.logo-row span{font-family:Georgia,serif;font-weight:700;color:#006747;font-size:20px;}');
  w.document.write('.congrats{font-size:22px;font-weight:700;color:#006747;margin:8px 0;}');
  w.document.write('.detail{font-size:15px;margin:6px 0;color:#333;}');
  w.document.write('.amount{font-size:28px;font-weight:700;color:#006747;margin:12px 0;}');
  w.document.write('.sig{margin-top:24px;border-top:1px solid #ccc;padding-top:12px;display:flex;justify-content:space-between;}');
  w.document.write('.sig-line{width:45%;border-bottom:1px solid #999;padding-bottom:4px;font-size:12px;color:#999;}');
  w.document.write('@media print{.slip{margin:0.2in auto;}}');
  w.document.write('</style></head><body>');
  const c=S.config;
  winners.forEach(e=>{
    const tipAmt=e.tipType==='pct'&&e.tipValue?(e.winnings*Number(e.tipValue)/100):e.tipType==='flat'&&e.tipValue?Number(e.tipValue):0;
    const net=e.winnings-tipAmt;
    const ordinal=e.rank===1?'1st':e.rank===2?'2nd':e.rank===3?'3rd':e.rank+'th';
    w.document.write('<div class="slip">');
    w.document.write('<div class="logo-row"><img src="'+CCC_LOGO+'" /><span>best4.golf</span></div>');
    w.document.write('<div style="font-size:14px;color:#666;">'+c.name+'</div>');
    w.document.write('<div class="congrats">Congratulations, '+e.participant+'!</div>');
    w.document.write('<div class="detail">'+ordinal+' Place</div>');
    w.document.write('<div class="detail">Score: '+e.best4+' ('+((e.vsPar>=0?'+':'')+e.vsPar)+')</div>');
    w.document.write('<div class="amount">Winnings: $'+Math.round(e.winnings)+'</div>');
    if(tipAmt>0){
      w.document.write('<div class="detail" style="color:#999;">Tip pledge: -$'+Math.round(tipAmt)+' &rarr; Net payout: $'+Math.round(net)+'</div>');
    }
    w.document.write('<div class="sig"><div class="sig-line">Commissioner signature</div><div class="sig-line">Date</div></div>');
    w.document.write('</div>');
  });
  w.document.write('</body></html>');
  w.document.close();
  setTimeout(()=>w.print(),500);
}

  sc2.scored.filter(e=>e.rank!=null).forEach(e=>{

  });
  w.document.write('</tbody></table></body></html>');
  w.document.close();
  setTimeout(()=>w.print(),500);
}

function R(){
  applyTheme();
  const app=document.getElementById('app');app.innerHTML='';
  if(!S.loaded){app.append($('div',{style:{textAlign:'center',padding:'80px',color:'var(--med)'}},'Loading...'));return;}
  if(S.mode===null){app.append($('div',{className:'page'},rLanding()));return;}
  if(S.mode==='admin'&&!S.isAdmin){app.append($('div',{className:'page'},rPin()));return;}
  if(S.mode==='player'&&!S.playerEmail){app.append($('div',{className:'page'},rPlayerSignin()));return;}
  app.append(rTopbar());const page=$('div',{className:'page'});
  if(S.config.name){
    const subDiv=$('div',{style:{textAlign:'center',margin:'-12px 0 16px'}});
    subDiv.append($('div',{style:{fontSize:'20px',fontWeight:'700',color:'var(--green)',letterSpacing:'0.3px'}},S.config.name));
    let sub2=S.config.course;if(S.config.commissionerName)sub2+=' — Commissioner: '+S.config.commissionerName;
    subDiv.append($('div',{style:{fontSize:'13px',color:'var(--med)',marginTop:'2px'}},sub2));
    page.append(subDiv);
  }
  const v=S.view;
  if(S.isAdmin){if(v==='setup')page.append(rSetup());if(v==='golfers')page.append(rGolfers());if(v==='entries'){page.append(rEntryForm(true));page.append(rEntryList(true));}if(v==='scores'){page.append(rScores());}if(v==='leaderboard')page.append(rLeaderboard());if(v==='payouts')page.append(rPayouts());if(v==='announce')page.append(rAnnounce());if(v==='archive')page.append(rArchive());if(v==='whatif')page.append(rWhatIf());}
  else{if(v==='leaderboard')page.append(rLeaderboard());if(v==='enter'){page.append(rEntryForm(false));page.append(rEntryList(false));}if(v==='whatif')page.append(rWhatIf());if(v==='rules')page.append(rRules());}
  app.append(page);
}
load();
</script>
